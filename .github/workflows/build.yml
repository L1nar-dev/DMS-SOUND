name: Build Purpur Plugin

on:
  push:
    branches: [ "main", "master" ] # Запускать сборку при пуше в эти ветки
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 1. Скачиваем код из твоего репозитория на виртуальную машину
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. Устанавливаем Java 21 (она нужна для 1.21.1 / Purpur)
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven' # Кэшируем зависимости, чтобы сборка шла быстрее

    # 3. Запускаем компиляцию через Мавен
    - name: Build with Maven
      run: mvn -B clean package --file pom.xml

    # 4. Сохраняем готовый плагин, чтобы его можно было скачать из Гитхаба
    - name: Upload compiled plugin
      uses: actions/upload-artifact@v4
      with:
        name: ServerMusic-Plugin
        path: target/*.jar
